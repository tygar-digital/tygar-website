# ══════════════════════════════════════════════
# Netlify Konfiguration — Friseur Template
# ══════════════════════════════════════════════

[build]
  # Kein Build-Step nötig — statisches HTML
  publish = "."
  command = ""

# Sicherheits-Header
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options          = "DENY"
    X-Content-Type-Options   = "nosniff"
    X-XSS-Protection         = "1; mode=block"
    Referrer-Policy          = "strict-origin-when-cross-origin"
    Permissions-Policy       = "camera=(), microphone=(), geolocation=(self)"

# Cache-Regeln für Performance
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*.json"
  [headers.values]
    Cache-Control = "public, max-age=300"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Weiterleitungen
[[redirects]]
  from = "/termin"
  to   = "/#termin"
  status = 301

[[redirects]]
  from = "/book"
  to   = "/#termin"
  status = 301
